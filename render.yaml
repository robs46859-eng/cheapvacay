services:
  - type: web
    name: cheapvacay-india
    runtime: node
    plan: starter
    disk:
      name: cheapvacay-data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /var/data
      - key: GEMINI_API_KEY
        sync: false
